<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Radhe Krishna Bike Rental | Dwarka</title>

<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">

<style>
:root {
  --black:#0d0d0d;
  --white:#f9f7f4;
  --cream:#f2ede6;
  --accent:#c9a84c;
  --gray:#6b6b6b;
}

body {
  margin:0;
  font-family:'DM Sans',sans-serif;
  background:var(--white);
}

/* NAV */
nav {
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  padding:1rem 5%;
  background:#ffffffdd;
  backdrop-filter:blur(10px);
}

.logo {
  font-family:'Cormorant Garamond',serif;
  font-weight:700;
}

.nav-links a {
  margin:0 1rem;
  text-decoration:none;
  color:var(--gray);
}

/* HERO */
#hero {
  padding:8rem 5% 4rem;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:2rem;
}

.hero-title {
  font-family:'Cormorant Garamond',serif;
  font-size:3rem;
}

.hero-img img {
  width:100%;
  border-radius:10px;
}

/* FLEET */
.fleet-grid {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:1.5rem;
}

.card {
  background:#fff;
  border-radius:10px;
  overflow:hidden;
  box-shadow:0 10px 30px rgba(0,0,0,0.08);
}

.card img {
  width:100%;
  height:180px;
  object-fit:cover;
}

.card-body {
  padding:1rem;
}

.price {
  font-weight:700;
}

/* BUTTON */
.btn {
  display:inline-block;
  padding:0.7rem 1.5rem;
  background:black;
  color:white;
  text-decoration:none;
  margin-top:10px;
}

/* CONTACT */
iframe {
  width:100%;
  height:300px;
  border:0;
  border-radius:10px;
}

/* MOBILE */
@media(max-width:800px){
  #hero {
    grid-template-columns:1fr;
  }
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
  <div class="logo">Radhe Krishna</div>
  <div class="nav-links">
    <a href="#fleet">Fleet</a>
    <a href="#contact">Contact</a>
  </div>
</nav>

<!-- HERO -->
<section id="hero">
  <div>
    <h1 class="hero-title">Ride Dwarka on Your Terms</h1>
    <p>Premium bikes & cars with instant WhatsApp booking.</p>
    <a href="#fleet" class="btn">View Vehicles</a>
  </div>

  <div class="hero-img">
    <img src="https://images.unsplash.com/photo-1558981806-ec527fa84c39" alt="bike">
  </div>
</section>

<!-- FLEET -->
<section id="fleet" style="padding:4rem 5%;">
  <h2>Our Fleet</h2>

  <div class="fleet-grid">

    <!-- ACTIVA -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1583267746897-2cf415887172">
      <div class="card-body">
        <h3>Honda Activa</h3>
        <p class="price">₹350/day</p>
        <a href="https://wa.me/919876543210?text=I want Activa" class="btn">Book</a>
      </div>
    </div>

    <!-- ERTIGA -->
    <div class="card">
      <img src="https://images.unsplash.com/photo-1605559424843-9e4c228bf1c2">
      <div class="card-body">
        <h3>Ertiga</h3>
        <p class="price">₹2200/day</p>
        <a href="https://wa.me/919876543210?text=I want Ertiga" class="btn">Book</a>
      </div>
    </div>

  </div>
</section>

<!-- CONTACT -->
<section id="contact" style="padding:4rem 5%;">
  <h2>Contact</h2>

  <p>📍 Dwarka, Gujarat</p>
  <p>📞 +91 XXXXX XXXXX</p>

  <a href="https://wa.me/919876543210" class="btn">Chat on WhatsApp</a>

  <br><br>

  <!-- MAP -->
  <iframe src="https://maps.google.com/maps?q=dwarka%20gujarat&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
</section>

</body>
</html>
